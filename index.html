<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherium Teacher</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --bg-color: #121212;
      --panel-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --accent-color: #ff69b4;
      --system-color: #00cccc;
    }
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #sidebar {
      width: 300px;
      background-color: var(--panel-bg);
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 15px;
      box-sizing: border-box;
    }
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .message.user {
      align-self: flex-end;
      background-color: var(--accent-color);
      color: #000;
    }
    .message.assistant {
      align-self: flex-start;
      background-color: #2a2a2a;
      border-left: 4px solid var(--accent-color);
    }
    .message.system {
      align-self: center;
      background-color: #223333;
      border: 1px solid var(--system-color);
      color: var(--system-color);
      font-family: monospace;
      max-width: 90%;
    }
    #input-area {
      padding: 15px;
      background-color: var(--panel-bg);
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      padding: 10px;
      border-radius: 4px;
      resize: none;
      height: 50px;
    }
    button {
      background-color: var(--accent-color);
      color: #000;
      border: none;
      padding: 0 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    .status-box {
      margin-bottom: 20px;
      background: #252525;
      padding: 10px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      box-sizing: border-box;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h3>Aetherium Status</h3>
    <div class="status-box">
      <strong>API Key (Gemini):</strong>
      <input type="text" id="api-key" placeholder="AIzaSy...">
    </div>
    <div class="status-box">
      <strong>進捗状況</strong>
      <pre id="progress-view">未初期化</pre>
    </div>
    <button id="btn-save" style="margin-bottom: 10px;">セーブデータ出力</button>
    <button id="btn-load" style="background-color: #555; color: #fff;">セーブデータ読込</button>
  </div>

  <div id="chat-container">
    <div id="chat-log"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="メッセージを入力、または選択肢を入力..."></textarea>
      <button id="btn-send">送信</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
